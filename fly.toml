# Fly.io configuration for pgproxy.
#
# Before first deploy:
#
#   fly apps create pgproxy
#   fly deploy
#
# pgproxy is a Fly 6PN-only service (no Tailscale). Reach it from other
# Fly apps over 6PN, or from a Tailscale tailnet via a separate subnet
# router (e.g. fly-apps/tailscale-router) that bridges the tailnet to
# Fly 6PN.
#
# The proxy will start up with no databases configured. From another Fly
# app on the 6PN network, open http://pgproxy.internal/ for the dev
# reference page and copy the example into a
# `fly secrets set DESTINATION_PG_DBS='...'` command when you're ready
# to add databases:
#
#   fly secrets set DESTINATION_PG_DBS='[
#     {"name":"rw","listen":5432,
#      "target":"ep-xxx.aws.neon.tech:5432",
#      "dbname":"main","user":"app_user","password":"..."},
#     {"name":"admin","listen":5439,
#      "target":"ep-xxx.aws.neon.tech:5432"}
#   ]'
#   fly deploy
#
# Entries with user+password are "managed": the proxy authenticates
# upstream itself and clients connect with no credentials, e.g.
# postgres://pgproxy.internal:5432/mydb. Entries without are
# passthrough (client supplies real upstream credentials).

app = "pgproxy"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret defaults; uncomment to override.
  # UPSTREAM_CA_FILE = "/etc/ssl/certs/ca-certificates.crt"

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 512

# No [[services]] block: pgproxy is internal-only. Postgres on the
# per-database listen ports over Fly 6PN; HTTPS CONNECT proxy on 8080
# (Fly 6PN only); debug + dev reference page on 80 (Fly 6PN). Reach any
# of these from the tailnet via a separate Tailscale subnet router.
